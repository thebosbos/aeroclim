<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" role="img" aria-label="Illustration technique Aeroclim">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
  </defs>

  <rect width="900" height="700" rx="36" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g opacity="0.25">
    <path d="M0 140H900M0 280H900M0 420H900M0 560H900" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <path d="M150 0V700M300 0V700M450 0V700M600 0V700M750 0V700" stroke="rgba(255,255,255,0.14)" stroke-width="2"/>
  </g>

  <!-- main glass card -->
  <g filter="url(#shadow)">
    <rect x="110" y="120" width="680" height="460" rx="28" fill="url(#card)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>

    <!-- header -->
    <g opacity="0.95">
      <circle cx="165" cy="175" r="10" fill="rgba(255,255,255,0.55)"/>
      <circle cx="195" cy="175" r="10" fill="rgba(255,255,255,0.35)"/>
      <circle cx="225" cy="175" r="10" fill="rgba(255,255,255,0.22)"/>
      <rect x="260" y="164" width="250" height="22" rx="11" fill="rgba(255,255,255,0.20)"/>
    </g>

    <!-- diagram blocks -->
    <g>
      <rect x="150" y="230" width="270" height="140" rx="18" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.18)"/>
      <rect x="450" y="230" width="300" height="90" rx="18" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.18)"/>
      <rect x="450" y="340" width="300" height="170" rx="18" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.18)"/>

      <!-- pipes/lines -->
      <path d="M240 370C240 420 260 450 310 450H450" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="6" stroke-linecap="round"/>
      <path d="M420 300H450" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="6" stroke-linecap="round"/>
      <path d="M600 320V340" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="6" stroke-linecap="round"/>

      <!-- gauge -->
      <g transform="translate(170 260)">
        <circle cx="70" cy="70" r="58" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
        <path d="M24 84a52 52 0 0 1 92-30" fill="none" stroke="rgba(20,184,166,0.9)" stroke-width="8" stroke-linecap="round"/>
        <path d="M70 70L110 48" stroke="rgba(255,255,255,0.85)" stroke-width="5" stroke-linecap="round"/>
        <circle cx="70" cy="70" r="6" fill="rgba(255,255,255,0.85)"/>
      </g>

      <!-- mini cards -->
      <rect x="470" y="250" width="260" height="18" rx="9" fill="rgba(255,255,255,0.20)"/>
      <rect x="470" y="278" width="200" height="18" rx="9" fill="rgba(255,255,255,0.16)"/>
      <rect x="470" y="360" width="260" height="18" rx="9" fill="rgba(255,255,255,0.20)"/>
      <rect x="470" y="388" width="230" height="18" rx="9" fill="rgba(255,255,255,0.16)"/>
      <rect x="470" y="416" width="210" height="18" rx="9" fill="rgba(255,255,255,0.14)"/>
      <rect x="470" y="462" width="160" height="42" rx="14" fill="rgba(20,184,166,0.70)"/>
    </g>
  </g>

  <!-- bottom label -->
  <g opacity="0.9">
    <rect x="110" y="605" width="320" height="54" rx="18" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.20)"/>
    <path d="M145 632h36" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round"/>
    <path d="M195 632h190" stroke="rgba(255,255,255,0.55)" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>
